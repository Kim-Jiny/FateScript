<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DUO Admin</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; }

    /* Login */
    .login-container { display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .login-box { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 100%; max-width: 360px; }
    .login-box h1 { text-align: center; margin-bottom: 30px; color: #333; }
    .login-box input { width: 100%; padding: 12px 16px; margin-bottom: 16px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; }
    .login-box button { width: 100%; padding: 14px; background: #6C5CE7; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; }
    .login-box button:hover { background: #5B4BD5; }
    .error { color: #e74c3c; text-align: center; margin-bottom: 16px; }

    /* Dashboard */
    .dashboard { display: none; }
    .header { background: #6C5CE7; color: white; padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; }
    .header h1 { font-size: 20px; }
    .header button { background: rgba(255,255,255,0.2); border: none; color: white; padding: 8px 16px; border-radius: 6px; cursor: pointer; }

    /* Tab Navigation */
    .nav-tabs { display: flex; background: white; border-bottom: 2px solid #eee; padding: 0 24px; }
    .nav-tabs button { padding: 14px 24px; border: none; background: none; cursor: pointer; font-size: 15px; font-weight: 500; color: #888; border-bottom: 3px solid transparent; margin-bottom: -2px; transition: all 0.2s; }
    .nav-tabs button.active { color: #6C5CE7; border-bottom-color: #6C5CE7; }
    .nav-tabs button:hover { color: #6C5CE7; }

    .tab-content { display: none; padding: 24px; }
    .tab-content.active { display: block; }

    /* Stats Cards */
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 16px; margin-bottom: 24px; }
    .stat-card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
    .stat-card h3 { color: #888; font-size: 13px; margin-bottom: 8px; }
    .stat-card .number { font-size: 28px; font-weight: bold; color: #333; }
    .stat-card .sub { font-size: 12px; color: #aaa; margin-top: 4px; }
    .stat-card.accent .number { color: #6C5CE7; }
    .stat-card.warn .number { color: #e74c3c; }
    .stat-card.success .number { color: #27ae60; }

    /* Game Popularity Chart */
    .chart-container { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
    .chart-container h3 { margin-bottom: 16px; color: #333; font-size: 16px; }
    .bar-chart .bar-row { display: flex; align-items: center; margin-bottom: 10px; }
    .bar-row .bar-label { width: 140px; font-size: 13px; color: #555; flex-shrink: 0; }
    .bar-row .bar-track { flex: 1; height: 24px; background: #f0f0f0; border-radius: 12px; overflow: hidden; margin-right: 12px; }
    .bar-row .bar-fill { height: 100%; background: linear-gradient(90deg, #6C5CE7, #A29BFE); border-radius: 12px; transition: width 0.5s; min-width: 2px; }
    .bar-row .bar-count { font-size: 13px; color: #888; width: 50px; text-align: right; }

    /* Tables */
    .data-table { width: 100%; border-collapse: collapse; background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
    .data-table th, .data-table td { padding: 12px 16px; text-align: left; border-bottom: 1px solid #f0f0f0; font-size: 14px; }
    .data-table th { background: #fafafa; color: #888; font-weight: 600; font-size: 13px; }
    .data-table tr:hover { background: #f9f9f9; }
    .data-table tr:last-child td { border-bottom: none; }
    .data-table tr { cursor: pointer; }

    /* Search / Toolbar */
    .toolbar { display: flex; gap: 12px; margin-bottom: 16px; align-items: center; flex-wrap: wrap; }
    .toolbar input[type="text"] { padding: 10px 16px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; min-width: 280px; }
    .toolbar button { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; }

    /* Pagination */
    .pagination { display: flex; gap: 8px; justify-content: center; margin-top: 16px; align-items: center; }
    .pagination button { padding: 8px 14px; border: 1px solid #ddd; background: white; border-radius: 6px; cursor: pointer; font-size: 13px; }
    .pagination button.active { background: #6C5CE7; color: white; border-color: #6C5CE7; }
    .pagination button:disabled { opacity: 0.4; cursor: default; }
    .pagination span { font-size: 13px; color: #888; }

    /* Filter Tabs */
    .filter-tabs { display: flex; gap: 8px; margin-bottom: 16px; }
    .filter-tabs button { padding: 8px 16px; border: none; background: #e0e0e0; border-radius: 8px; cursor: pointer; font-size: 13px; }
    .filter-tabs button.active { background: #6C5CE7; color: white; }

    /* Badges */
    .badge { padding: 4px 10px; border-radius: 4px; font-size: 12px; font-weight: 500; }
    .badge.pending { background: #fff3cd; color: #856404; }
    .badge.replied { background: #d4edda; color: #155724; }
    .badge.bug { background: #f8d7da; color: #721c24; }
    .badge.suggestion { background: #fff3cd; color: #856404; }
    .badge.account { background: #cce5ff; color: #004085; }
    .badge.other { background: #e2e3e5; color: #383d41; }
    .badge.general { background: #e2e3e5; color: #383d41; }
    .badge.maintenance { background: #fff3cd; color: #856404; }
    .badge.event { background: #d4edda; color: #155724; }
    .badge.urgent { background: #f8d7da; color: #721c24; }
    .badge.active { background: #d4edda; color: #155724; }
    .badge.inactive { background: #e2e3e5; color: #888; }
    .badge.ban-active { background: #f8d7da; color: #721c24; }
    .badge.ban-revoked { background: #e2e3e5; color: #888; text-decoration: line-through; }

    /* Modal */
    .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); justify-content: center; align-items: flex-start; z-index: 100; overflow-y: auto; padding: 40px 20px; }
    .modal.show { display: flex; }
    .modal-content { background: white; border-radius: 12px; width: 100%; max-width: 800px; margin: auto; }
    .modal-header { padding: 20px 24px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; background: white; border-radius: 12px 12px 0 0; z-index: 1; }
    .modal-header h2 { font-size: 18px; }
    .modal-close { background: none; border: none; font-size: 24px; cursor: pointer; color: #888; }
    .modal-body { padding: 24px; }
    .modal-footer { padding: 16px 24px; border-top: 1px solid #eee; display: flex; gap: 12px; justify-content: flex-end; }
    .modal-footer button { padding: 10px 20px; border-radius: 8px; cursor: pointer; font-size: 14px; }

    /* Buttons */
    .btn-primary { background: #6C5CE7; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-size: 14px; }
    .btn-primary:hover { background: #5B4BD5; }
    .btn-danger { background: #e74c3c; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-size: 14px; }
    .btn-success { background: #27ae60; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-size: 14px; }
    .btn-warning { background: #f39c12; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-size: 14px; }
    .btn-secondary { background: #e0e0e0; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-size: 14px; }
    .btn-sm { padding: 6px 12px; font-size: 12px; }

    /* Collapsible Sections */
    .section-toggle { background: #f5f5f5; padding: 12px 16px; border-radius: 8px; cursor: pointer; font-weight: 600; display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; font-size: 14px; }
    .section-toggle:hover { background: #eee; }
    .section-body { display: none; padding: 12px; background: #fafafa; border-radius: 8px; margin-bottom: 12px; }
    .section-body.show { display: block; }

    /* Forms */
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-weight: 600; margin-bottom: 6px; color: #555; font-size: 13px; }
    .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 10px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
    .form-group textarea { resize: vertical; min-height: 100px; }
    .form-row { display: flex; gap: 12px; }
    .form-row .form-group { flex: 1; }

    /* Info Table */
    .info-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .info-table th, .info-table td { padding: 8px 12px; text-align: left; border-bottom: 1px solid #eee; }
    .info-table th { background: #f5f5f5; font-weight: 600; width: 130px; }
    .info-table tr:last-child td, .info-table tr:last-child th { border-bottom: none; }

    .content-box { background: #f5f5f5; padding: 14px; border-radius: 8px; margin-bottom: 16px; white-space: pre-wrap; font-size: 14px; }

    .empty { text-align: center; padding: 60px; color: #888; }

    /* Coin display */
    .coin-display { display: flex; align-items: center; gap: 8px; }
    .coin-badge { background: #ffd700; color: #333; padding: 4px 12px; border-radius: 12px; font-weight: 600; font-size: 16px; }

    /* Session / Record items */
    .session-item { background: white; padding: 10px 12px; border-radius: 6px; margin-bottom: 8px; font-size: 13px; border: 1px solid #f0f0f0; }
    .session-header { display: flex; justify-content: space-between; margin-bottom: 4px; }
    .session-platform { font-weight: 600; color: #6C5CE7; }
    .session-date { color: #888; font-size: 12px; }
    .session-detail { color: #666; }

    .mileage-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; background: white; border-radius: 6px; margin-bottom: 6px; font-size: 13px; border: 1px solid #f0f0f0; }
    .mileage-amount.positive { color: #27ae60; font-weight: 600; }
    .mileage-amount.negative { color: #e74c3c; font-weight: 600; }

    /* Toggle switch */
    .toggle-switch { position: relative; display: inline-block; width: 44px; height: 24px; }
    .toggle-switch input { opacity: 0; width: 0; height: 0; }
    .toggle-slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; border-radius: 24px; transition: .3s; }
    .toggle-slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; border-radius: 50%; transition: .3s; }
    .toggle-switch input:checked + .toggle-slider { background-color: #6C5CE7; }
    .toggle-switch input:checked + .toggle-slider:before { transform: translateX(20px); }

    /* ===== Mobile Responsive ===== */
    @media (max-width: 768px) {
      /* Header */
      .header { padding: 12px 16px; }
      .header h1 { font-size: 17px; }
      .header button { padding: 6px 12px; font-size: 13px; }

      /* Tab Navigation - horizontal scroll */
      .nav-tabs { padding: 0 8px; overflow-x: auto; -webkit-overflow-scrolling: touch; gap: 0; }
      .nav-tabs::-webkit-scrollbar { display: none; }
      .nav-tabs button { padding: 12px 14px; font-size: 13px; white-space: nowrap; flex-shrink: 0; }

      /* Tab content */
      .tab-content { padding: 16px 12px; }

      /* Stats grid */
      .stats-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
      .stat-card { padding: 14px; }
      .stat-card h3 { font-size: 11px; }
      .stat-card .number { font-size: 22px; }

      /* Chart */
      .chart-container { padding: 14px; }
      .bar-row .bar-label { width: 80px; font-size: 11px; }
      .bar-row .bar-count { width: 40px; font-size: 11px; }

      /* Tables - horizontal scroll wrapper approach via overflow */
      .data-table { display: block; overflow-x: auto; -webkit-overflow-scrolling: touch; }
      .data-table thead { display: table; width: 100%; table-layout: auto; }
      .data-table tbody { display: table; width: 100%; table-layout: auto; }
      .data-table th, .data-table td { padding: 10px 10px; font-size: 12px; white-space: nowrap; }
      .data-table th { font-size: 11px; }

      /* Toolbar */
      .toolbar { flex-direction: column; gap: 8px; }
      .toolbar input[type="text"] { min-width: 0; width: 100%; }
      .toolbar button { width: 100%; }

      /* Pagination */
      .pagination { flex-wrap: wrap; gap: 4px; }
      .pagination button { padding: 6px 10px; font-size: 12px; }

      /* Filter Tabs */
      .filter-tabs { overflow-x: auto; -webkit-overflow-scrolling: touch; flex-wrap: nowrap; }
      .filter-tabs::-webkit-scrollbar { display: none; }
      .filter-tabs button { white-space: nowrap; flex-shrink: 0; font-size: 12px; padding: 6px 12px; }

      /* Modals */
      .modal { padding: 16px 8px; }
      .modal-content { max-width: 100% !important; border-radius: 10px; }
      .modal-header { padding: 14px 16px; }
      .modal-header h2 { font-size: 16px; }
      .modal-body { padding: 16px; }
      .modal-footer { padding: 12px 16px; flex-wrap: wrap; }
      .modal-footer button { flex: 1; min-width: 0; font-size: 13px; padding: 10px 12px; }

      /* Forms */
      .form-row { flex-direction: column; gap: 0; }
      .form-group input, .form-group textarea, .form-group select { font-size: 16px; } /* prevent iOS zoom */

      /* Info table in modals */
      .info-table { display: block; overflow-x: auto; -webkit-overflow-scrolling: touch; }
      .info-table th { width: 90px; font-size: 11px; padding: 6px 8px; white-space: nowrap; }
      .info-table td { font-size: 12px; padding: 6px 8px; word-break: break-all; }

      /* Mileage & session items stack on mobile */
      .mileage-item { flex-direction: column; align-items: flex-start; gap: 4px; }
      .coin-display { flex-wrap: wrap; }

      /* Content box */
      .content-box { padding: 10px; font-size: 13px; }

      /* Buttons */
      .btn-primary, .btn-danger, .btn-success, .btn-warning, .btn-secondary { font-size: 13px; padding: 8px 14px; }

      /* Section toggles */
      .section-toggle { font-size: 13px; padding: 10px 12px; }

      /* Session & mileage items */
      .session-item { padding: 8px 10px; font-size: 12px; }
      .mileage-item { padding: 6px 10px; font-size: 12px; }

      /* Ad config grid */
      #adConfigContainer { grid-template-columns: 1fr !important; }

      /* Login adjustments */
      .login-box { padding: 24px 20px; margin: 0 12px; }
    }

    @media (max-width: 380px) {
      .stats-grid { grid-template-columns: 1fr; }
      .stat-card .number { font-size: 20px; }
      .nav-tabs button { padding: 10px 10px; font-size: 12px; }
      .bar-row .bar-label { width: 60px; font-size: 10px; }
    }
  </style>
</head>
<body>
  <!-- Login -->
  <div class="login-container" id="loginContainer">
    <div class="login-box">
      <h1>DUO Admin</h1>
      <div class="error" id="loginError"></div>
      <input type="text" id="username" placeholder="Username" autocomplete="off">
      <input type="password" id="password" placeholder="Password">
      <button onclick="login()">Login</button>
    </div>
  </div>

  <!-- Dashboard -->
  <div class="dashboard" id="dashboard">
    <div class="header">
      <h1>DUO Admin</h1>
      <button onclick="logout()">Logout</button>
    </div>

    <div class="nav-tabs">
      <button class="active" onclick="switchTab('dashboard', this)">Dashboard</button>
      <button onclick="switchTab('users', this)">Users</button>
      <button onclick="switchTab('inquiries', this)">Inquiries</button>
      <button onclick="switchTab('notices', this)">Notices</button>
      <button onclick="switchTab('settings', this)">Settings</button>
    </div>

    <!-- Dashboard Tab -->
    <div class="tab-content active" id="tab-dashboard">
      <div class="stats-grid" id="statsGrid"></div>
      <div class="chart-container">
        <h3>Game Popularity</h3>
        <div class="bar-chart" id="gameChart"></div>
      </div>
    </div>

    <!-- Users Tab -->
    <div class="tab-content" id="tab-users">
      <div class="toolbar">
        <input type="text" id="userSearch" placeholder="Search by nickname, ID, or email..." onkeypress="if(event.key==='Enter')searchUsers()">
        <button class="btn-primary" onclick="searchUsers()">Search</button>
      </div>
      <table class="data-table" id="usersTable">
        <thead>
          <tr><th>ID</th><th>Nickname</th><th>Email</th><th>Provider</th><th>Coins</th><th>Joined</th></tr>
        </thead>
        <tbody id="usersBody"><tr><td colspan="6" class="empty">Search for users</td></tr></tbody>
      </table>
      <div class="pagination" id="usersPagination"></div>
    </div>

    <!-- Inquiries Tab -->
    <div class="tab-content" id="tab-inquiries">
      <div class="filter-tabs" id="inquiryFilters">
        <button class="active" onclick="filterInquiries('all', this)">All</button>
        <button onclick="filterInquiries('pending', this)">Pending</button>
        <button onclick="filterInquiries('replied', this)">Replied</button>
      </div>
      <table class="data-table">
        <thead>
          <tr><th>ID</th><th>Title</th><th>Category</th><th>User</th><th>Status</th><th>Date</th></tr>
        </thead>
        <tbody id="inquiriesBody"><tr><td colspan="6" class="empty">Loading...</td></tr></tbody>
      </table>
    </div>

    <!-- Notices Tab -->
    <div class="tab-content" id="tab-notices">
      <div class="toolbar">
        <button class="btn-primary" onclick="openNoticeModal()">+ New Notice</button>
      </div>
      <table class="data-table">
        <thead>
          <tr><th>ID</th><th>Title</th><th>Type</th><th>Status</th><th>Created</th><th>Actions</th></tr>
        </thead>
        <tbody id="noticesBody"><tr><td colspan="6" class="empty">Loading...</td></tr></tbody>
      </table>
    </div>

    <!-- Settings Tab -->
    <div class="tab-content" id="tab-settings">
      <h3 style="margin-bottom:16px;color:#333">Ad Settings</h3>
      <div id="adConfigContainer" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px">
        <div class="empty">Loading...</div>
      </div>
    </div>
  </div>

  <!-- Inquiry Detail Modal -->
  <div class="modal" id="inquiryModal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="inqModalTitle">Inquiry Detail</h2>
        <button class="modal-close" onclick="closeModal('inquiryModal')">&times;</button>
      </div>
      <div class="modal-body">
        <label style="font-weight:600;color:#555;font-size:13px">User</label>
        <div class="content-box" id="inqUser"></div>
        <label style="font-weight:600;color:#555;font-size:13px">Category</label>
        <div class="content-box" id="inqCategory"></div>
        <label style="font-weight:600;color:#555;font-size:13px">Content</label>
        <div class="content-box" id="inqContent"></div>

        <div class="section-toggle" onclick="toggleSection('inqDeviceInfo')">Device Info <span>&#9660;</span></div>
        <div id="inqDeviceInfo" class="section-body"></div>
        <div class="section-toggle" onclick="toggleSection('inqGameStats')">Game Stats <span>&#9660;</span></div>
        <div id="inqGameStats" class="section-body"></div>
        <div class="section-toggle" onclick="toggleSection('inqRecentGames')">Recent Games <span>&#9660;</span></div>
        <div id="inqRecentGames" class="section-body"></div>

        <div id="inqReplySection">
          <label style="font-weight:600;color:#555;font-size:13px">Reply</label>
          <textarea id="inqReplyText" placeholder="Enter reply..." style="width:100%;padding:10px;border:1px solid #ddd;border-radius:8px;min-height:100px;font-size:14px"></textarea>
        </div>
        <div id="inqExistingReply" style="display:none">
          <label style="font-weight:600;color:#555;font-size:13px">Reply (Sent)</label>
          <div class="content-box" id="inqReplyContent"></div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-danger btn-sm" onclick="deleteInquiry()">Delete</button>
        <button class="btn-secondary" onclick="closeModal('inquiryModal')">Close</button>
        <button class="btn-primary" id="inqReplyBtn" onclick="submitInquiryReply()">Send Reply</button>
      </div>
    </div>
  </div>

  <!-- User Detail Modal -->
  <div class="modal" id="userModal">
    <div class="modal-content" style="max-width:900px">
      <div class="modal-header">
        <h2 id="userModalTitle">User Detail</h2>
        <button class="modal-close" onclick="closeModal('userModal')">&times;</button>
      </div>
      <div class="modal-body" id="userModalBody">
        <div class="empty">Loading...</div>
      </div>
    </div>
  </div>

  <!-- Notice Modal -->
  <div class="modal" id="noticeModal">
    <div class="modal-content" style="max-width:600px">
      <div class="modal-header">
        <h2 id="noticeModalTitle">New Notice</h2>
        <button class="modal-close" onclick="closeModal('noticeModal')">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>Title</label>
          <input type="text" id="noticeTitle" placeholder="Notice title">
        </div>
        <div class="form-group">
          <label>Type</label>
          <select id="noticeType">
            <option value="general">General</option>
            <option value="maintenance">Maintenance</option>
            <option value="event">Event</option>
            <option value="urgent">Urgent</option>
          </select>
        </div>
        <div class="form-group">
          <label>Content</label>
          <textarea id="noticeContent" placeholder="Notice content..."></textarea>
        </div>
        <div class="form-group" style="display:flex;align-items:center;gap:12px">
          <label style="margin:0">Active</label>
          <label class="toggle-switch">
            <input type="checkbox" id="noticeActive" checked>
            <span class="toggle-slider"></span>
          </label>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-secondary" onclick="closeModal('noticeModal')">Cancel</button>
        <button class="btn-primary" id="noticeSaveBtn" onclick="saveNotice()">Create</button>
      </div>
    </div>
  </div>

  <script>
    let token = localStorage.getItem('adminToken');
    let currentInquiry = null;
    let currentUserPage = 1;
    let editingNoticeId = null;

    if (token) showDashboard();

    // ============================================================
    // Auth
    // ============================================================
    async function login() {
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const errorEl = document.getElementById('loginError');
      try {
        const res = await fetch('/api/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        if (data.success) {
          token = data.token;
          localStorage.setItem('adminToken', token);
          showDashboard();
        } else {
          errorEl.textContent = data.error || 'Login failed';
        }
      } catch (e) {
        errorEl.textContent = 'Connection error';
      }
    }

    function logout() {
      token = null;
      localStorage.removeItem('adminToken');
      document.getElementById('loginContainer').style.display = 'flex';
      document.getElementById('dashboard').style.display = 'none';
    }

    function showDashboard() {
      document.getElementById('loginContainer').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';
      loadStats();
      loadInquiries('all');
      loadNotices();
      searchUsers();
      loadAdConfig();
    }

    function api(url, options = {}) {
      return fetch(url, {
        ...options,
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}`, ...(options.headers || {}) }
      }).then(r => {
        if (r.status === 401) { logout(); throw new Error('Unauthorized'); }
        return r.json();
      });
    }

    // ============================================================
    // Tabs
    // ============================================================
    function switchTab(tabName, btn) {
      document.querySelectorAll('.nav-tabs button').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('tab-' + tabName).classList.add('active');
    }

          <div class="stat-card"><h3>Total Users</h3><div class="number">${data.totalUsers}</div></div>
          <div class="stat-card accent"><h3>New Today</h3><div class="number">${data.newUsersToday}</div><div class="sub">Week: ${data.newUsersWeek} / Month: ${data.newUsersMonth}</div></div>
          <div class="stat-card success"><h3>Active Users (7d)</h3><div class="number">${data.activeUsers}</div></div>

          <div class="stat-card"><h3>Ad Views Total</h3><div class="number">${ad.total}</div><div class="sub">${ad.totalCoins} coins paid</div></div>
        `;

        // Game popularity chart
        const chart = document.getElementById('gameChart');
        if (data.gamePopularity && data.gamePopularity.length > 0) {
          const max = Math.max(...data.gamePopularity.map(g => parseInt(g.count)));
          chart.innerHTML = data.gamePopularity.map(g => {
            const pct = max > 0 ? (parseInt(g.count) / max * 100) : 0;
            return `<div class="bar-row">
              <span class="bar-label">${getGameLabel(g.game_type)}</span>
              <div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div>
              <span class="bar-count">${g.count}</span>
            </div>`;
          }).join('');
        } else {
          chart.innerHTML = '<div class="empty" style="padding:20px">No game data</div>';

    // ============================================================
    // Users
    // ============================================================
    async function searchUsers(page) {
      page = page || 1;
      currentUserPage = page;
      const q = document.getElementById('userSearch').value;
      try {
        const data = await api(`/api/admin/users?q=${encodeURIComponent(q)}&page=${page}&limit=20`);
        const tbody = document.getElementById('usersBody');
        if (data.users.length === 0) {
          tbody.innerHTML = '<tr><td colspan="6" class="empty">No users found</td></tr>';
        } else {
          tbody.innerHTML = data.users.map(u => `
            <tr onclick="openUserDetail(${u.id})">
              <td>${u.id}</td>
              <td>${escapeHtml(u.nickname)}</td>
              <td>${u.email || '-'}</td>
              <td>${u.provider}</td>
              <td>${u.coins}</td>
              <td>${formatDate(u.created_at)}</td>
            </tr>
          `).join('');
        }

        // Pagination
        const pg = document.getElementById('usersPagination');
        if (data.totalPages > 1) {
          let html = `<button ${page<=1?'disabled':''} onclick="searchUsers(${page-1})">Prev</button>`;
          html += `<span>Page ${data.page} / ${data.totalPages} (${data.total} users)</span>`;
          html += `<button ${page>=data.totalPages?'disabled':''} onclick="searchUsers(${page+1})">Next</button>`;
          pg.innerHTML = html;
        } else {
          pg.innerHTML = data.total > 0 ? `<span>${data.total} users</span>` : '';
        }
      } catch (e) {
        console.error('Failed to search users', e);
      }
    }

    async function openUserDetail(userId) {
      document.getElementById('userModalTitle').textContent = 'User #' + userId;
      document.getElementById('userModalBody').innerHTML = '<div class="empty">Loading...</div>';
      document.getElementById('userModal').classList.add('show');

        renderUserDetail(data);
      } catch (e) {
        document.getElementById('userModalBody').innerHTML = '<div class="empty">Failed to load</div>';
      }
    }

        });
        html += '</table>';
      }
      html += '</div>';

      body.innerHTML = html;

    async function grantCoins(userId) {
      const amount = parseInt(document.getElementById('coinAmount').value);
      const reason = document.getElementById('coinReason').value;
      if (!amount || !reason.trim()) return alert('Amount and reason are required');
      try {
        const data = await api(`/api/admin/users/${userId}/coins`, {
          method: 'POST', body: JSON.stringify({ amount, reason })
        });
        if (data.success) {
          alert('Coins updated. New balance: ' + data.newBalance);
          openUserDetail(userId);
        } else {
          alert(data.error || 'Failed');
        }
      } catch (e) { alert('Error'); }
    }

    async function banUser(userId) {
      const ban_type = document.getElementById('banType').value;
      const reason = document.getElementById('banReason').value;
      const duration_hours = parseInt(document.getElementById('banDuration').value) || null;
      if (!reason.trim()) return alert('Reason is required');
      if (!confirm('Ban this user?')) return;
      try {
        const data = await api(`/api/admin/users/${userId}/ban`, {
          method: 'POST', body: JSON.stringify({ ban_type, reason, duration_hours })
        });
        if (data.success) { alert('User banned'); openUserDetail(userId); }
        else alert(data.error || 'Failed');
      } catch (e) { alert('Error'); }
    }

    async function unbanUser(userId) {
      if (!confirm('Unban this user?')) return;
      try {
        const data = await api(`/api/admin/users/${userId}/unban`, { method: 'POST', body: '{}' });
        if (data.success) { alert('User unbanned'); openUserDetail(userId); }
        else alert(data.error || 'Failed');
      } catch (e) { alert('Error'); }
    }

    async function forceNickname(userId) {
      const nickname = document.getElementById('newNickname').value;
      const reason = document.getElementById('nickReason').value;
      if (!nickname.trim() || !reason.trim()) return alert('Nickname and reason are required');
      if (!confirm(`Change nickname to "${nickname}"?`)) return;
      try {
        const data = await api(`/api/admin/users/${userId}/nickname`, {
          method: 'PUT', body: JSON.stringify({ nickname, reason })
        });
        if (data.success) { alert('Nickname changed'); openUserDetail(userId); searchUsers(currentUserPage); }
        else alert(data.error || 'Failed');
      } catch (e) { alert('Error'); }
    }

    // ============================================================
    // Inquiries
    // ============================================================
    async function loadInquiries(status) {
      try {
        const data = await api(`/api/admin/inquiries?status=${status}`);
        const tbody = document.getElementById('inquiriesBody');
        if (!data.inquiries || data.inquiries.length === 0) {
          tbody.innerHTML = '<tr><td colspan="6" class="empty">No inquiries</td></tr>';

            <td>${escapeHtml(i.title)}</td>
            <td><span class="badge ${i.category}">${getCategoryLabel(i.category)}</span></td>

          </tr>
        `).join('');

        document.getElementById('inquiriesBody').innerHTML = '<tr><td colspan="6" class="empty">Failed to load</td></tr>';

    function filterInquiries(status, btn) {
      document.querySelectorAll('#inquiryFilters button').forEach(b => b.classList.remove('active'));

      loadInquiries(status);

    async function openInquiry(inquiryId) {
      document.getElementById('inquiryModal').classList.add('show');
      document.getElementById('inqDeviceInfo').innerHTML = '<div style="color:#888">Loading...</div>';
      document.getElementById('inqGameStats').innerHTML = '<div style="color:#888">Loading...</div>';
      document.getElementById('inqRecentGames').innerHTML = '<div style="color:#888">Loading...</div>';
      document.querySelectorAll('#inquiryModal .section-body').forEach(el => el.classList.remove('show'));

      try {
        const data = await api(`/api/admin/inquiries/${inquiryId}`);
        currentInquiry = data.inquiry;

        document.getElementById('inqModalTitle').textContent = data.inquiry.title;
        document.getElementById('inqUser').textContent = `${data.inquiry.nickname || 'Unknown'} (${data.inquiry.email || 'No email'})`;
        document.getElementById('inqCategory').textContent = getCategoryLabel(data.inquiry.category);
        document.getElementById('inqContent').textContent = data.inquiry.content;

        if (data.inquiry.reply) {
          document.getElementById('inqReplySection').style.display = 'none';
          document.getElementById('inqExistingReply').style.display = 'block';
          document.getElementById('inqReplyContent').textContent = data.inquiry.reply;
          document.getElementById('inqReplyBtn').style.display = 'none';
        } else {
          document.getElementById('inqReplySection').style.display = 'block';
          document.getElementById('inqExistingReply').style.display = 'none';
          document.getElementById('inqReplyText').value = '';
          document.getElementById('inqReplyBtn').style.display = 'inline-block';
        }

        renderInquiryUserInfo(data);
      } catch (e) {
        console.error('Failed to load inquiry detail');
      }
    }

    function renderInquiryUserInfo(data) {
      // Device Info
      const deviceEl = document.getElementById('inqDeviceInfo');
      if (data.sessions && data.sessions.length > 0) {
        deviceEl.innerHTML = data.sessions.map(s => `
          <div class="session-item">
            <div class="session-header">
              <span class="session-platform">${s.platform || 'Unknown'} ${s.os_version || ''}</span>
              <span class="session-date">${formatDateTime(s.created_at)}</span>
            </div>
            <div class="session-detail">${s.device_model || 'Unknown'} | v${s.app_version || '?'}(${s.build_number || '?'}) | ${s.ip_address || 'Unknown'}</div>
          </div>
        `).join('');
      } else {
        deviceEl.innerHTML = '<div style="color:#888">No session data</div>';
      }

      // Game Stats
      const statsEl = document.getElementById('inqGameStats');
      let statsHtml = `<div style="margin-bottom:12px">Mileage: <span class="coin-badge">${data.mileage || 0}</span></div>`;
      if (data.stats && data.stats.length > 0) {
        statsHtml += '<table class="info-table"><tr><th>Game</th><th>Win</th><th>Lose</th><th>Draw</th><th>Level</th></tr>';
        data.stats.forEach(s => {
          statsHtml += `<tr><td>${getGameLabel(s.game_type)}</td><td style="color:#27ae60">${s.wins}</td><td style="color:#e74c3c">${s.losses}</td><td>${s.draws}</td><td>Lv.${s.level}</td></tr>`;
        });
        statsHtml += '</table>';
      } else {
        statsHtml += '<div style="color:#888">No game stats</div>';
      }
      statsEl.innerHTML = statsHtml;

      // Recent Games
      const gamesEl = document.getElementById('inqRecentGames');
      if (data.recentGames && data.recentGames.length > 0) {
        const userNickname = data.inquiry.nickname;
        gamesEl.innerHTML = data.recentGames.map(g => {
          let result = 'draw', resultText = 'Draw';
          if (g.winner_id) {
            const isWinner = g.winner_id === data.inquiry.user_id;
            result = isWinner ? 'win' : 'lose';
            resultText = isWinner ? 'Win' : 'Lose';
          }
          const opponent = g.player1_nickname === userNickname ? g.player2_nickname : g.player1_nickname;
          return `<div style="display:flex;justify-content:space-between;align-items:center;padding:8px;background:white;border-radius:6px;margin-bottom:6px;font-size:13px;border:1px solid #f0f0f0">
            <span>${getGameLabel(g.game_type)} vs ${opponent || 'Unknown'}</span>
            <span><span style="font-weight:600;color:${result==='win'?'#27ae60':result==='lose'?'#e74c3c':'#888'}">${resultText}</span>
            <span style="color:#888;margin-left:8px;font-size:12px">${formatDateTime(g.created_at)}</span></span>
          </div>`;
        }).join('');
      } else {
        gamesEl.innerHTML = '<div style="color:#888">No recent games</div>';
      }
    }

    async function submitInquiryReply() {
      const reply = document.getElementById('inqReplyText').value;
      if (!reply.trim() || !currentInquiry) return;
      try {
        const data = await api(`/api/admin/inquiries/${currentInquiry.id}/reply`, {
          method: 'PUT', body: JSON.stringify({ reply })
        });
        if (data.success) {
          closeModal('inquiryModal');
          loadStats();
          loadInquiries('all');
        } else {
          alert(data.error || 'Failed to reply');
        }
      } catch (e) { alert('Connection error'); }
    }

    async function deleteInquiry() {
      if (!currentInquiry || !confirm('Delete this inquiry?')) return;
      try {
        const data = await api(`/api/admin/inquiries/${currentInquiry.id}`, { method: 'DELETE' });
        if (data.success) {
          closeModal('inquiryModal');
          loadStats();
          loadInquiries('all');
        }
      } catch (e) { alert('Failed to delete'); }
    }

            <td>
              <button class="btn-primary btn-sm" onclick="event.stopPropagation();editNotice(${n.id},'${escapeAttr(n.title)}','${escapeAttr(n.content)}','${n.type}',${n.is_active})">Edit</button>
              <button class="btn-danger btn-sm" onclick="event.stopPropagation();deleteNotice(${n.id})">Del</button>
            </td>
          </tr>
        `).join('');
      } catch (e) {
        document.getElementById('noticesBody').innerHTML = '<tr><td colspan="6" class="empty">Failed to load</td></tr>';
      }
    }

    function openNoticeModal() {
      editingNoticeId = null;
      document.getElementById('noticeModalTitle').textContent = 'New Notice';
      document.getElementById('noticeTitle').value = '';
      document.getElementById('noticeType').value = 'general';
      document.getElementById('noticeContent').value = '';
      document.getElementById('noticeActive').checked = true;
      document.getElementById('noticeSaveBtn').textContent = 'Create';
      document.getElementById('noticeModal').classList.add('show');
    }

    function editNotice(id, title, content, type, isActive) {
      editingNoticeId = id;
      document.getElementById('noticeModalTitle').textContent = 'Edit Notice';
      document.getElementById('noticeTitle').value = title;
      document.getElementById('noticeType').value = type;
      document.getElementById('noticeContent').value = content;
      document.getElementById('noticeActive').checked = isActive;
      document.getElementById('noticeSaveBtn').textContent = 'Update';
      document.getElementById('noticeModal').classList.add('show');
    }

    async function saveNotice() {
      const title = document.getElementById('noticeTitle').value;
      const content = document.getElementById('noticeContent').value;
      const type = document.getElementById('noticeType').value;
      const is_active = document.getElementById('noticeActive').checked;

      if (!title.trim() || !content.trim()) return alert('Title and content are required');

      try {
        let data;
        if (editingNoticeId) {
          data = await api(`/api/admin/notices/${editingNoticeId}`, {
            method: 'PUT', body: JSON.stringify({ title, content, type, is_active })
          });
        } else {
          data = await api('/api/admin/notices', {
            method: 'POST', body: JSON.stringify({ title, content, type, is_active })
          });
        }
        if (data.success) {
          closeModal('noticeModal');
          loadNotices();
        } else {
          alert(data.error || 'Failed');
        }
      } catch (e) { alert('Error'); }
    }

    async function deleteNotice(id) {
      if (!confirm('Delete this notice?')) return;
      try {
        const data = await api(`/api/admin/notices/${id}`, { method: 'DELETE' });
        if (data.success) loadNotices();
      } catch (e) { alert('Failed to delete'); }
    }

    // ============================================================
    // Helpers
    // ============================================================
    function closeModal(modalId) {
      document.getElementById(modalId).classList.remove('show');
      if (modalId === 'inquiryModal') currentInquiry = null;
    }

    function toggleSection(id) {
      document.getElementById(id).classList.toggle('show');
    }

    function getGameLabel(gameType) {
      const labels = {
        'tictactoe': 'Tic-Tac-Toe', 'infinite_tictactoe': 'Infinite TTT',
        'gomoku': 'Gomoku', 'reaction': 'Reaction', 'speed_tap': 'Speed Tap',
        'rps': 'Rock Paper Scissors', 'sequence_memory': 'Sequence Memory',
        'stroop': 'Stroop', 'hexagon': 'Hexagon'
      };
      return labels[gameType] || gameType;
    }

    function getCategoryLabel(cat) {
      const labels = { bug: 'Bug', suggestion: 'Suggestion', account: 'Account', other: 'Other' };
      return labels[cat] || cat;
    }

    function getNoticeTypeLabel(type) {
      const labels = { general: 'General', maintenance: 'Maintenance', event: 'Event', urgent: 'Urgent' };
      return labels[type] || type;
    }

    function formatDate(dateStr) {
      if (!dateStr) return '-';
      const d = new Date(dateStr);
      return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
    }

    function formatDateTime(dateStr) {
      if (!dateStr) return '-';
      const d = new Date(dateStr);
      return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    }

    function escapeHtml(str) {
      if (!str) return '';
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function escapeAttr(str) {
      if (!str) return '';
      return str.replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/"/g, '\\"').replace(/\n/g, '\\n');
    }

    // ============================================================
    // Ad Config (Settings)
    // ============================================================
    async function loadAdConfig() {
      try {
        const data = await api('/api/admin/ad-config');
        const container = document.getElementById('adConfigContainer');
        if (!data.configs || data.configs.length === 0) {
          container.innerHTML = '<div class="empty">No ad config found</div>';
          return;
        }
        container.innerHTML = data.configs.map(c => {
          const isToggle = c.config_value === 'true' || c.config_value === 'false';
          const labels = {
            reward_coins: 'Reward Coins',
            reward_daily_limit: 'Daily Limit',
            reward_enabled: 'Reward Enabled',
          };
          const label = labels[c.config_key] || c.config_key;

          if (isToggle) {
            const checked = c.config_value === 'true' ? 'checked' : '';
            return `<div class="stat-card">
              <h3>${label}</h3>
              <div style="display:flex;align-items:center;gap:12px;margin-top:8px">
                <label class="toggle-switch">
                  <input type="checkbox" ${checked} onchange="saveAdConfig('${c.config_key}', this.checked ? 'true' : 'false')">
                  <span class="toggle-slider"></span>
                </label>
                <span style="color:#555">${c.config_value === 'true' ? 'ON' : 'OFF'}</span>
              </div>
              <div class="sub" style="margin-top:8px">${c.description || ''}</div>
            </div>`;
          }

          return `<div class="stat-card">
            <h3>${label}</h3>
            <div style="display:flex;gap:8px;margin-top:8px;align-items:center">
              <input type="number" id="adcfg_${c.config_key}" value="${c.config_value}" style="width:100px;padding:8px 12px;border:1px solid #ddd;border-radius:8px;font-size:16px;font-weight:bold">
              <button class="btn-primary btn-sm" onclick="saveAdConfig('${c.config_key}', document.getElementById('adcfg_${c.config_key}').value)">Save</button>
            </div>
            <div class="sub" style="margin-top:8px">${c.description || ''}</div>
          </div>`;
        }).join('');
      } catch (e) {
        console.error('Failed to load ad config', e);
        document.getElementById('adConfigContainer').innerHTML = '<div class="empty">Failed to load</div>';
      }
    }

    async function saveAdConfig(key, value) {
      try {
        const data = await api(`/api/admin/ad-config/${key}`, {
          method: 'PUT', body: JSON.stringify({ value })
        });
        if (data.success) {
          loadAdConfig();
        } else {
          alert(data.error || 'Failed to save');
        }
      } catch (e) {
        alert('Error saving config');
      }
    }

    // Enter key for login
    document.getElementById('password').addEventListener('keypress', e => {
      if (e.key === 'Enter') login();
    });

    // Close modals on backdrop click
    document.querySelectorAll('.modal').forEach(modal => {
      modal.addEventListener('click', e => {
        if (e.target === modal) modal.classList.remove('show');
      });
    });
  </script>
</body>
</html>
