<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>운명일기 관리자</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #333; }

  /* Login */
  .login-wrap { display: flex; justify-content: center; align-items: center; min-height: 100vh; }
  .login-box { background: #fff; padding: 40px; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); width: 360px; }
  .login-box h1 { font-size: 22px; margin-bottom: 24px; text-align: center; color: #8A4FFF; }
  .login-box input { width: 100%; padding: 12px 16px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; margin-bottom: 12px; }
  .login-box button { width: 100%; padding: 12px; background: #8A4FFF; color: #fff; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; }
  .login-box button:hover { background: #7a3fef; }
  .login-error { color: #e53e3e; font-size: 13px; margin-bottom: 12px; display: none; }

  /* Layout */
  .app { display: none; }
  .header { background: #fff; padding: 16px 24px; border-bottom: 1px solid #e5e7eb; display: flex; justify-content: space-between; align-items: center; }
  .header h1 { font-size: 18px; color: #8A4FFF; }
  .header-right { display: flex; align-items: center; gap: 12px; }
  .header button { padding: 6px 14px; background: none; border: 1px solid #ddd; border-radius: 6px; cursor: pointer; font-size: 13px; }
  .content { max-width: 960px; margin: 24px auto; padding: 0 16px; }

  /* Tabs */
  .tabs { display: flex; gap: 0; margin-bottom: 20px; border-bottom: 2px solid #e5e7eb; }
  .tabs button { padding: 10px 20px; border: none; background: none; cursor: pointer; font-size: 14px; font-weight: 600; color: #999; border-bottom: 2px solid transparent; margin-bottom: -2px; }
  .tabs button.active { color: #8A4FFF; border-bottom-color: #8A4FFF; }
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* Filters */
  .filters { display: flex; gap: 8px; margin-bottom: 16px; }
  .filters button { padding: 8px 16px; border: 1px solid #ddd; background: #fff; border-radius: 8px; cursor: pointer; font-size: 13px; }
  .filters button.active { background: #8A4FFF; color: #fff; border-color: #8A4FFF; }

  /* Table */
  .inquiry-list { background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 1px 8px rgba(0,0,0,0.05); }
  .inquiry-item { padding: 16px 20px; border-bottom: 1px solid #f0f0f0; cursor: pointer; display: flex; align-items: center; gap: 12px; }
  .inquiry-item:hover { background: #faf8ff; }
  .inquiry-item:last-child { border-bottom: none; }
  .badge { padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: 600; flex-shrink: 0; }
  .badge.pending { background: #fef3cd; color: #856404; }
  .badge.replied { background: #d4edda; color: #155724; }
  .inquiry-info { flex: 1; min-width: 0; }
  .inquiry-title { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .inquiry-meta { font-size: 12px; color: #999; margin-top: 4px; }
  .inquiry-category { font-size: 11px; color: #8A4FFF; background: #f3eeff; padding: 2px 8px; border-radius: 4px; flex-shrink: 0; }

  /* Detail */
  .detail-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 100; justify-content: center; align-items: center; }
  .detail-overlay.show { display: flex; }
  .detail-box { background: #fff; border-radius: 16px; width: 600px; max-width: 95vw; max-height: 85vh; overflow-y: auto; padding: 28px; }
  .detail-box h2 { font-size: 18px; margin-bottom: 8px; }
  .detail-section { margin: 16px 0; }
  .detail-section label { font-size: 12px; color: #888; display: block; margin-bottom: 4px; }
  .detail-section .value { font-size: 14px; line-height: 1.6; white-space: pre-wrap; background: #f9f9f9; padding: 12px; border-radius: 8px; }
  .reply-box textarea { width: 100%; height: 120px; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; resize: vertical; font-family: inherit; }
  .reply-box button { margin-top: 8px; padding: 10px 24px; background: #8A4FFF; color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; }
  .reply-box button:hover { background: #7a3fef; }
  .reply-existing { background: #f0fdf4; padding: 12px; border-radius: 8px; font-size: 14px; line-height: 1.6; white-space: pre-wrap; border-left: 3px solid #22c55e; }
  .close-btn { float: right; background: none; border: none; font-size: 22px; cursor: pointer; color: #999; }
  .empty { text-align: center; padding: 60px 20px; color: #999; font-size: 14px; }

  /* Product table */
  .product-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  .product-header h2 { font-size: 16px; font-weight: 700; }
  .btn-add { padding: 8px 16px; background: #8A4FFF; color: #fff; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; }
  .btn-add:hover { background: #7a3fef; }
  .product-table { width: 100%; background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 1px 8px rgba(0,0,0,0.05); border-collapse: collapse; }
  .product-table th { background: #f9fafb; padding: 12px 16px; text-align: left; font-size: 12px; color: #6b7280; font-weight: 600; border-bottom: 1px solid #e5e7eb; }
  .product-table td { padding: 12px 16px; font-size: 14px; border-bottom: 1px solid #f0f0f0; }
  .product-table tr:last-child td { border-bottom: none; }
  .product-table tr:hover { background: #faf8ff; }
  .toggle { position: relative; display: inline-block; width: 40px; height: 22px; cursor: pointer; }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .toggle .slider { position: absolute; inset: 0; background: #ccc; border-radius: 22px; transition: .2s; }
  .toggle .slider:before { content: ''; position: absolute; width: 16px; height: 16px; left: 3px; bottom: 3px; background: #fff; border-radius: 50%; transition: .2s; }
  .toggle input:checked + .slider { background: #8A4FFF; }
  .toggle input:checked + .slider:before { transform: translateX(18px); }
  .btn-edit, .btn-del { padding: 4px 10px; border: 1px solid #ddd; border-radius: 6px; background: #fff; cursor: pointer; font-size: 12px; margin-right: 4px; }
  .btn-edit:hover { border-color: #8A4FFF; color: #8A4FFF; }
  .btn-del { color: #e53e3e; border-color: #fecaca; }
  .btn-del:hover { background: #fef2f2; }

  /* Modal form */
  .modal-form label { display: block; font-size: 13px; color: #555; margin-bottom: 4px; margin-top: 12px; }
  .modal-form input { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
  .modal-form .form-actions { margin-top: 20px; display: flex; gap: 8px; justify-content: flex-end; }
  .modal-form .form-actions button { padding: 10px 20px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; border: none; }
  .modal-form .btn-cancel { background: #f3f4f6; color: #333; }
  .modal-form .btn-save { background: #8A4FFF; color: #fff; }
  .modal-form .btn-save:hover { background: #7a3fef; }
</style>
</head>
<body>

<!-- Login -->
<div class="login-wrap" id="loginView">
  <div class="login-box">
    <h1>운명일기 관리자</h1>
    <div class="login-error" id="loginError"></div>
    <input type="text" id="username" placeholder="아이디" autocomplete="username">
    <input type="password" id="password" placeholder="비밀번호" autocomplete="current-password">
    <button onclick="login()">로그인</button>
  </div>
</div>

<!-- App -->
<div class="app" id="appView">
  <div class="header">
    <h1>운명일기 관리자</h1>
    <button onclick="logout()">로그아웃</button>
  </div>
  <div class="content">
    <div class="tabs">
      <button class="active" onclick="switchTab('inquiries', this)">문의관리</button>
      <button onclick="switchTab('products', this)">상품관리</button>
    </div>

    <!-- 문의관리 탭 -->
    <div class="tab-content active" id="tab-inquiries">
      <div class="filters">
        <button class="active" onclick="filterStatus('all', this)">전체</button>
        <button onclick="filterStatus('pending', this)">대기중</button>
        <button onclick="filterStatus('replied', this)">답변완료</button>
      </div>
      <div class="inquiry-list" id="inquiryList"></div>
    </div>

    <!-- 상품관리 탭 -->
    <div class="tab-content" id="tab-products">
      <div class="product-header">
        <h2>인앱결제 상품</h2>
        <button class="btn-add" onclick="openProductModal()">+ 상품 추가</button>
      </div>
      <table class="product-table">
        <thead>
          <tr>
            <th>상품 ID</th>
            <th>상품명</th>
            <th>티켓 수</th>
            <th>가격 (원)</th>
            <th>활성</th>
            <th>정렬</th>
            <th>관리</th>
          </tr>
        </thead>
        <tbody id="productBody"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- Detail Modal (inquiries) -->
<div class="detail-overlay" id="detailOverlay" onclick="if(event.target===this)closeDetail()">
  <div class="detail-box" id="detailBox"></div>
</div>

<!-- Product Modal -->
<div class="detail-overlay" id="productOverlay" onclick="if(event.target===this)closeProductModal()">
  <div class="detail-box">
    <button class="close-btn" onclick="closeProductModal()">&times;</button>
    <h2 id="productModalTitle">상품 추가</h2>
    <div class="modal-form">
      <input type="hidden" id="prodEditId">
      <label>상품 ID (Apple/Google 등록 ID)</label>
      <input type="text" id="prodId" placeholder="saju_ticket_5">
      <label>상품명</label>
      <input type="text" id="prodName" placeholder="사주 티켓 5장">
      <label>티켓 수</label>
      <input type="number" id="prodTicketCount" placeholder="5">
      <label>가격 (원)</label>
      <input type="number" id="prodPrice" placeholder="5900">
      <label>정렬 순서</label>
      <input type="number" id="prodSort" placeholder="0">
      <div class="form-actions">
        <button class="btn-cancel" onclick="closeProductModal()">취소</button>
        <button class="btn-save" onclick="saveProduct()">저장</button>
      </div>
    </div>
  </div>
</div>

<script>
const API = '';
let token = localStorage.getItem('admin_token');
let currentTab = 'inquiries';

if (token) { showApp(); loadInquiries(); }

async function login() {
  const username = document.getElementById('username').value;
  const password = document.getElementById('password').value;
  const errEl = document.getElementById('loginError');
  errEl.style.display = 'none';

  try {
    const res = await fetch(`${API}/api/admin/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    const data = await res.json();
    if (!res.ok) { errEl.textContent = data.error || '로그인 실패'; errEl.style.display = 'block'; return; }
    token = data.token;
    localStorage.setItem('admin_token', token);
    showApp();
    loadInquiries();
  } catch (e) {
    errEl.textContent = '서버 연결 실패'; errEl.style.display = 'block';
  }
}

function logout() {
  token = null;
  localStorage.removeItem('admin_token');
  document.getElementById('appView').style.display = 'none';
  document.getElementById('loginView').style.display = 'flex';
}

function showApp() {
  document.getElementById('loginView').style.display = 'none';
  document.getElementById('appView').style.display = 'block';
}

// ── Tab Switching ──

function switchTab(tab, btn) {
  currentTab = tab;
  document.querySelectorAll('.tabs button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');

  if (tab === 'inquiries') loadInquiries();
  if (tab === 'products') loadProducts();
}

// ── Inquiries ──

let currentFilter = 'all';

function filterStatus(status, btn) {
  currentFilter = status;
  document.querySelectorAll('.filters button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  loadInquiries();
}

async function loadInquiries() {
  try {
    const url = currentFilter === 'all' ? `${API}/api/admin/inquiries` : `${API}/api/admin/inquiries?status=${currentFilter}`;
    const res = await fetch(url, { headers: { Authorization: `Bearer ${token}` } });
    if (res.status === 401) { logout(); return; }
    const data = await res.json();
    renderList(data.inquiries || []);
  } catch (e) {
    document.getElementById('inquiryList').innerHTML = '<div class="empty">목록을 불러올 수 없습니다.</div>';
  }
}

function renderList(items) {
  const el = document.getElementById('inquiryList');
  if (items.length === 0) { el.innerHTML = '<div class="empty">문의가 없습니다.</div>'; return; }

  el.innerHTML = items.map(i => `
    <div class="inquiry-item" onclick="openDetail(${i.id})">
      <span class="badge ${i.status}">${i.status === 'replied' ? '답변완료' : '대기중'}</span>
      <div class="inquiry-info">
        <div class="inquiry-title">${esc(i.title)}</div>
        <div class="inquiry-meta">${esc(i.email || i.uid)} &middot; ${fmtDate(i.created_at)}</div>
      </div>
      <span class="inquiry-category">${esc(i.category)}</span>
    </div>
  `).join('');
}

async function openDetail(id) {
  try {
    const res = await fetch(`${API}/api/admin/inquiries/${id}`, { headers: { Authorization: `Bearer ${token}` } });
    const data = await res.json();
    const i = data.inquiry;

    let replyHtml;
    if (i.status === 'replied') {
      replyHtml = `
        <div class="detail-section">
          <label>답변 (${fmtDate(i.replied_at)})</label>
          <div class="reply-existing">${esc(i.reply)}</div>
        </div>
        <div class="reply-box">
          <label style="font-size:12px;color:#888;margin-bottom:4px;display:block">답변 수정</label>
          <textarea id="replyText">${esc(i.reply)}</textarea>
          <button onclick="submitReply(${i.id})">답변 수정</button>
        </div>
      `;
    } else {
      replyHtml = `
        <div class="reply-box">
          <label style="font-size:12px;color:#888;margin-bottom:4px;display:block">답변 작성</label>
          <textarea id="replyText" placeholder="답변을 입력하세요..."></textarea>
          <button onclick="submitReply(${i.id})">답변 등록</button>
        </div>
      `;
    }

    document.getElementById('detailBox').innerHTML = `
      <button class="close-btn" onclick="closeDetail()">&times;</button>
      <span class="badge ${i.status}" style="margin-bottom:8px;display:inline-block">${i.status === 'replied' ? '답변완료' : '대기중'}</span>
      <span class="inquiry-category" style="margin-left:8px">${esc(i.category)}</span>
      <h2 style="margin-top:12px">${esc(i.title)}</h2>
      <div class="inquiry-meta">${esc(i.email || i.uid)} &middot; ${fmtDate(i.created_at)}</div>
      <div class="detail-section">
        <label>문의 내용</label>
        <div class="value">${esc(i.content)}</div>
      </div>
      ${replyHtml}
    `;
    document.getElementById('detailOverlay').classList.add('show');
  } catch (e) {
    alert('문의를 불러올 수 없습니다.');
  }
}

function closeDetail() {
  document.getElementById('detailOverlay').classList.remove('show');
}

async function submitReply(id) {
  const reply = document.getElementById('replyText').value.trim();
  if (!reply) { alert('답변을 입력하세요.'); return; }

  try {
    const res = await fetch(`${API}/api/admin/inquiries/${id}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
      body: JSON.stringify({ reply })
    });
    if (!res.ok) { alert('답변 등록 실패'); return; }
    closeDetail();
    loadInquiries();
  } catch (e) {
    alert('서버 오류');
  }
}

// ── Products ──

async function loadProducts() {
  try {
    const res = await fetch(`${API}/api/admin/products`, { headers: { Authorization: `Bearer ${token}` } });
    if (res.status === 401) { logout(); return; }
    const data = await res.json();
    renderProducts(data.products || []);
  } catch (e) {
    document.getElementById('productBody').innerHTML = '<tr><td colspan="7" style="text-align:center;padding:40px;color:#999">상품을 불러올 수 없습니다.</td></tr>';
  }
}

function renderProducts(items) {
  const el = document.getElementById('productBody');
  if (items.length === 0) {
    el.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:40px;color:#999">등록된 상품이 없습니다.</td></tr>';
    return;
  }

  el.innerHTML = items.map(p => `
    <tr>
      <td><code style="background:#f3f4f6;padding:2px 6px;border-radius:4px;font-size:12px">${esc(p.product_id)}</code></td>
      <td>${esc(p.name)}</td>
      <td>${p.ticket_count}장</td>
      <td>${Number(p.price_krw).toLocaleString()}원</td>
      <td>
        <label class="toggle">
          <input type="checkbox" ${p.is_active ? 'checked' : ''} onchange="toggleProduct(${p.id}, this.checked)">
          <span class="slider"></span>
        </label>
      </td>
      <td>${p.sort_order}</td>
      <td>
        <button class="btn-edit" onclick='editProduct(${JSON.stringify(p)})'>수정</button>
        <button class="btn-del" onclick="deleteProduct(${p.id}, '${esc(p.name)}')">삭제</button>
      </td>
    </tr>
  `).join('');
}

function openProductModal(product) {
  document.getElementById('prodEditId').value = product ? product.id : '';
  document.getElementById('prodId').value = product ? product.product_id : '';
  document.getElementById('prodId').disabled = !!product;
  document.getElementById('prodName').value = product ? product.name : '';
  document.getElementById('prodTicketCount').value = product ? product.ticket_count : '';
  document.getElementById('prodPrice').value = product ? product.price_krw : '';
  document.getElementById('prodSort').value = product ? product.sort_order : '0';
  document.getElementById('productModalTitle').textContent = product ? '상품 수정' : '상품 추가';
  document.getElementById('productOverlay').classList.add('show');
}

function closeProductModal() {
  document.getElementById('productOverlay').classList.remove('show');
  document.getElementById('prodId').disabled = false;
}

function editProduct(product) {
  openProductModal(product);
}

async function saveProduct() {
  const editId = document.getElementById('prodEditId').value;
  const body = {
    product_id: document.getElementById('prodId').value.trim(),
    name: document.getElementById('prodName').value.trim(),
    ticket_count: parseInt(document.getElementById('prodTicketCount').value) || 0,
    price_krw: parseInt(document.getElementById('prodPrice').value) || 0,
    sort_order: parseInt(document.getElementById('prodSort').value) || 0,
  };

  if (!body.product_id || !body.name || !body.ticket_count) {
    alert('상품 ID, 상품명, 티켓 수는 필수입니다.');
    return;
  }

  try {
    const url = editId ? `${API}/api/admin/products/${editId}` : `${API}/api/admin/products`;
    const method = editId ? 'PUT' : 'POST';
    const res = await fetch(url, {
      method,
      headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
      body: JSON.stringify(body)
    });

    if (!res.ok) {
      const data = await res.json();
      alert(data.error || '저장 실패');
      return;
    }

    closeProductModal();
    loadProducts();
  } catch (e) {
    alert('서버 오류');
  }
}

async function toggleProduct(id, isActive) {
  try {
    await fetch(`${API}/api/admin/products/${id}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
      body: JSON.stringify({ is_active: isActive })
    });
  } catch (e) {
    alert('상태 변경 실패');
    loadProducts();
  }
}

async function deleteProduct(id, name) {
  if (!confirm(`"${name}" 상품을 삭제하시겠습니까?`)) return;

  try {
    const res = await fetch(`${API}/api/admin/products/${id}`, {
      method: 'DELETE',
      headers: { Authorization: `Bearer ${token}` }
    });
    if (!res.ok) { alert('삭제 실패'); return; }
    loadProducts();
  } catch (e) {
    alert('서버 오류');
  }
}

// ── Utilities ──

function esc(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function fmtDate(s) {
  if (!s) return '';
  const d = new Date(s);
  return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

document.getElementById('password').addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
</script>
</body>
</html>
