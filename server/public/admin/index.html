<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>운명일기 관리자</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #333; }

  /* Login */
  .login-wrap { display: flex; justify-content: center; align-items: center; min-height: 100vh; }
  .login-box { background: #fff; padding: 40px; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); width: 360px; }
  .login-box h1 { font-size: 22px; margin-bottom: 24px; text-align: center; color: #8A4FFF; }
  .login-box input { width: 100%; padding: 12px 16px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; margin-bottom: 12px; }
  .login-box button { width: 100%; padding: 12px; background: #8A4FFF; color: #fff; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; }
  .login-box button:hover { background: #7a3fef; }
  .login-error { color: #e53e3e; font-size: 13px; margin-bottom: 12px; display: none; }

  /* Layout */
  .app { display: none; }
  .header { background: #fff; padding: 16px 24px; border-bottom: 1px solid #e5e7eb; display: flex; justify-content: space-between; align-items: center; }
  .header h1 { font-size: 18px; color: #8A4FFF; }
  .header button { padding: 6px 14px; background: none; border: 1px solid #ddd; border-radius: 6px; cursor: pointer; font-size: 13px; }
  .content { max-width: 960px; margin: 24px auto; padding: 0 16px; }

  /* Tabs */
  .tabs { display: flex; gap: 0; margin-bottom: 20px; border-bottom: 2px solid #e5e7eb; }
  .tabs button { padding: 10px 20px; border: none; background: none; cursor: pointer; font-size: 14px; font-weight: 600; color: #999; border-bottom: 2px solid transparent; margin-bottom: -2px; }
  .tabs button.active { color: #8A4FFF; border-bottom-color: #8A4FFF; }
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* Stat Cards */
  .stat-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 24px; }
  .stat-card { background: #fff; border-radius: 12px; padding: 20px; box-shadow: 0 1px 8px rgba(0,0,0,0.05); }
  .stat-card .label { font-size: 12px; color: #888; margin-bottom: 6px; }
  .stat-card .value { font-size: 24px; font-weight: 700; color: #333; }
  .stat-card .sub { font-size: 12px; color: #aaa; margin-top: 4px; }

  /* Service table */
  .service-table { width: 100%; background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 1px 8px rgba(0,0,0,0.05); border-collapse: collapse; }
  .service-table th { background: #f9fafb; padding: 12px 16px; text-align: left; font-size: 12px; color: #6b7280; font-weight: 600; border-bottom: 1px solid #e5e7eb; }
  .service-table td { padding: 12px 16px; font-size: 14px; border-bottom: 1px solid #f0f0f0; }
  .service-table tr:last-child td { border-bottom: none; }

  /* Search */
  .search-bar { display: flex; gap: 8px; margin-bottom: 16px; }
  .search-bar input { flex: 1; padding: 10px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
  .search-bar button { padding: 10px 20px; background: #8A4FFF; color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; }
  .search-bar button:hover { background: #7a3fef; }

  /* User table */
  .user-table { width: 100%; background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 1px 8px rgba(0,0,0,0.05); border-collapse: collapse; }
  .user-table th { background: #f9fafb; padding: 12px 16px; text-align: left; font-size: 12px; color: #6b7280; font-weight: 600; border-bottom: 1px solid #e5e7eb; }
  .user-table td { padding: 12px 16px; font-size: 13px; border-bottom: 1px solid #f0f0f0; }
  .user-table tr:last-child td { border-bottom: none; }
  .user-table tbody tr { cursor: pointer; }
  .user-table tbody tr:hover { background: #faf8ff; }

  /* Pagination */
  .pagination { display: flex; justify-content: center; align-items: center; gap: 8px; margin-top: 16px; }
  .pagination button { padding: 8px 14px; border: 1px solid #ddd; background: #fff; border-radius: 8px; cursor: pointer; font-size: 13px; }
  .pagination button:hover { border-color: #8A4FFF; color: #8A4FFF; }
  .pagination button:disabled { opacity: 0.4; cursor: default; }
  .pagination button:disabled:hover { border-color: #ddd; color: inherit; }
  .pagination span { font-size: 13px; color: #666; }

  /* Filters */
  .filters { display: flex; gap: 8px; margin-bottom: 16px; }
  .filters button { padding: 8px 16px; border: 1px solid #ddd; background: #fff; border-radius: 8px; cursor: pointer; font-size: 13px; }
  .filters button.active { background: #8A4FFF; color: #fff; border-color: #8A4FFF; }

  /* Inquiry list */
  .inquiry-list { background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 1px 8px rgba(0,0,0,0.05); }
  .inquiry-item { padding: 16px 20px; border-bottom: 1px solid #f0f0f0; cursor: pointer; display: flex; align-items: center; gap: 12px; }
  .inquiry-item:hover { background: #faf8ff; }
  .inquiry-item:last-child { border-bottom: none; }
  .badge { padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: 600; flex-shrink: 0; }
  .badge.pending { background: #fef3cd; color: #856404; }
  .badge.replied { background: #d4edda; color: #155724; }
  .inquiry-info { flex: 1; min-width: 0; }
  .inquiry-title { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .inquiry-meta { font-size: 12px; color: #999; margin-top: 4px; }
  .inquiry-category { font-size: 11px; color: #8A4FFF; background: #f3eeff; padding: 2px 8px; border-radius: 4px; flex-shrink: 0; }

  /* Detail overlay / modal */
  .detail-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 100; justify-content: center; align-items: center; }
  .detail-overlay.show { display: flex; }
  .detail-box { background: #fff; border-radius: 16px; width: 600px; max-width: 95vw; max-height: 85vh; overflow-y: auto; padding: 28px; }
  .detail-box h2 { font-size: 18px; margin-bottom: 8px; }
  .detail-section { margin: 16px 0; }
  .detail-section label { font-size: 12px; color: #888; display: block; margin-bottom: 4px; }
  .detail-section .value { font-size: 14px; line-height: 1.6; white-space: pre-wrap; background: #f9f9f9; padding: 12px; border-radius: 8px; }
  .reply-box textarea { width: 100%; height: 120px; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; resize: vertical; font-family: inherit; }
  .reply-box button { margin-top: 8px; padding: 10px 24px; background: #8A4FFF; color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; }
  .reply-box button:hover { background: #7a3fef; }
  .reply-existing { background: #f0fdf4; padding: 12px; border-radius: 8px; font-size: 14px; line-height: 1.6; white-space: pre-wrap; border-left: 3px solid #22c55e; }
  .close-btn { float: right; background: none; border: none; font-size: 22px; cursor: pointer; color: #999; }
  .empty { text-align: center; padding: 60px 20px; color: #999; font-size: 14px; }

  /* Product table */
  .product-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  .product-header h2 { font-size: 16px; font-weight: 700; }
  .btn-add { padding: 8px 16px; background: #8A4FFF; color: #fff; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; }
  .btn-add:hover { background: #7a3fef; }
  .product-table { width: 100%; background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 1px 8px rgba(0,0,0,0.05); border-collapse: collapse; }
  .product-table th { background: #f9fafb; padding: 12px 16px; text-align: left; font-size: 12px; color: #6b7280; font-weight: 600; border-bottom: 1px solid #e5e7eb; }
  .product-table td { padding: 12px 16px; font-size: 14px; border-bottom: 1px solid #f0f0f0; }
  .product-table tr:last-child td { border-bottom: none; }
  .product-table tr:hover { background: #faf8ff; }
  .toggle { position: relative; display: inline-block; width: 40px; height: 22px; cursor: pointer; }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .toggle .slider { position: absolute; inset: 0; background: #ccc; border-radius: 22px; transition: .2s; }
  .toggle .slider:before { content: ''; position: absolute; width: 16px; height: 16px; left: 3px; bottom: 3px; background: #fff; border-radius: 50%; transition: .2s; }
  .toggle input:checked + .slider { background: #8A4FFF; }
  .toggle input:checked + .slider:before { transform: translateX(18px); }
  .btn-edit, .btn-del { padding: 4px 10px; border: 1px solid #ddd; border-radius: 6px; background: #fff; cursor: pointer; font-size: 12px; margin-right: 4px; }
  .btn-edit:hover { border-color: #8A4FFF; color: #8A4FFF; }
  .btn-del { color: #e53e3e; border-color: #fecaca; }
  .btn-del:hover { background: #fef2f2; }

  /* Modal form */
  .modal-form label { display: block; font-size: 13px; color: #555; margin-bottom: 4px; margin-top: 12px; }
  .modal-form input { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
  .modal-form .form-actions { margin-top: 20px; display: flex; gap: 8px; justify-content: flex-end; }
  .modal-form .form-actions button { padding: 10px 20px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; border: none; }
  .modal-form .btn-cancel { background: #f3f4f6; color: #333; }
  .modal-form .btn-save { background: #8A4FFF; color: #fff; }
  .modal-form .btn-save:hover { background: #7a3fef; }

  /* User detail modal */
  .user-detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
  .user-detail-grid .field { background: #f9fafb; padding: 10px 14px; border-radius: 8px; }
  .user-detail-grid .field .label { font-size: 11px; color: #888; margin-bottom: 2px; }
  .user-detail-grid .field .val { font-size: 14px; font-weight: 600; }
  .mini-cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 16px; }
  .mini-card { background: #f3eeff; padding: 14px; border-radius: 10px; text-align: center; }
  .mini-card .num { font-size: 22px; font-weight: 700; color: #8A4FFF; }
  .mini-card .lbl { font-size: 11px; color: #666; margin-top: 2px; }
  .grant-form { display: flex; gap: 8px; margin-bottom: 16px; align-items: center; }
  .grant-form input { width: 120px; padding: 8px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
  .grant-form button { padding: 8px 16px; background: #8A4FFF; color: #fff; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; }
  .grant-form button:hover { background: #7a3fef; }
  .txn-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .txn-table th { background: #f9fafb; padding: 8px 10px; text-align: left; color: #6b7280; font-weight: 600; border-bottom: 1px solid #e5e7eb; }
  .txn-table td { padding: 8px 10px; border-bottom: 1px solid #f0f0f0; }
  .txn-table tr:last-child td { border-bottom: none; }
  .section-title { font-size: 14px; font-weight: 700; margin: 16px 0 8px; color: #555; }
</style>
</head>
<body>

<!-- Login -->
<div class="login-wrap" id="loginView">
  <div class="login-box">
    <h1>운명일기 관리자</h1>
    <div class="login-error" id="loginError"></div>
    <input type="text" id="username" placeholder="아이디" autocomplete="username">
    <input type="password" id="password" placeholder="비밀번호" autocomplete="current-password">
    <button onclick="login()">로그인</button>
  </div>
</div>

<!-- App -->
<div class="app" id="appView">
  <div class="header">
    <h1>운명일기 관리자</h1>
    <button onclick="logout()">로그아웃</button>
  </div>
  <div class="content">
    <div class="tabs">
      <button class="active" onclick="switchTab('dashboard', this)">대시보드</button>
      <button onclick="switchTab('users', this)">유저관리</button>
      <button onclick="switchTab('inquiries', this)">문의관리</button>
      <button onclick="switchTab('products', this)">상품관리</button>
    </div>

    <!-- 대시보드 탭 -->
    <div class="tab-content active" id="tab-dashboard">
      <div class="stat-cards" id="statCards">
        <div class="stat-card"><div class="label">총 유저 수</div><div class="value" id="statTotalUsers">-</div></div>
        <div class="stat-card"><div class="label">오늘 신규 유저</div><div class="value" id="statTodayUsers">-</div></div>
        <div class="stat-card"><div class="label">총 구매 건수</div><div class="value" id="statPurchaseCount">-</div><div class="sub" id="statPurchaseTickets"></div></div>
        <div class="stat-card"><div class="label">오늘 티켓 소모</div><div class="value" id="statTodayConsumption">-</div></div>
        <div class="stat-card"><div class="label">7일 활성 유저</div><div class="value" id="statActiveUsers">-</div></div>
      </div>
      <h3 style="font-size:15px;font-weight:700;margin-bottom:12px">서비스별 소모 내역</h3>
      <table class="service-table">
        <thead><tr><th>서비스</th><th>소모 건수</th><th>소모 티켓</th></tr></thead>
        <tbody id="serviceBody"><tr><td colspan="3" style="text-align:center;padding:30px;color:#999">로딩 중...</td></tr></tbody>
      </table>
    </div>

    <!-- 유저관리 탭 -->
    <div class="tab-content" id="tab-users">
      <div class="search-bar">
        <input type="text" id="userSearch" placeholder="이메일 또는 UID로 검색" onkeydown="if(event.key==='Enter')searchUsers()">
        <button onclick="searchUsers()">검색</button>
      </div>
      <table class="user-table">
        <thead>
          <tr>
            <th>UID</th>
            <th>이메일</th>
            <th>생년월일</th>
            <th>성별</th>
            <th>티켓</th>
            <th>가입일</th>
          </tr>
        </thead>
        <tbody id="userBody"><tr><td colspan="6" class="empty">검색하거나 탭을 선택하세요.</td></tr></tbody>
      </table>
      <div class="pagination" id="userPagination"></div>
    </div>

    <!-- 문의관리 탭 -->
    <div class="tab-content" id="tab-inquiries">
      <div class="filters">
        <button class="active" onclick="filterStatus('all', this)">전체</button>
        <button onclick="filterStatus('pending', this)">대기중</button>
        <button onclick="filterStatus('replied', this)">답변완료</button>
      </div>
      <div class="inquiry-list" id="inquiryList"></div>
    </div>

    <!-- 상품관리 탭 -->
    <div class="tab-content" id="tab-products">
      <div class="product-header">
        <h2>인앱결제 상품</h2>
        <button class="btn-add" onclick="openProductModal()">+ 상품 추가</button>
      </div>
      <table class="product-table">
        <thead>
          <tr>
            <th>상품 ID</th>
            <th>상품명</th>
            <th>티켓 수</th>
            <th>가격 (원)</th>
            <th>활성</th>
            <th>정렬</th>
            <th>관리</th>
          </tr>
        </thead>
        <tbody id="productBody"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- Inquiry Detail Modal -->
<div class="detail-overlay" id="detailOverlay" onclick="if(event.target===this)closeDetail()">
  <div class="detail-box" id="detailBox"></div>
</div>

<!-- Product Modal -->
<div class="detail-overlay" id="productOverlay" onclick="if(event.target===this)closeProductModal()">
  <div class="detail-box">
    <button class="close-btn" onclick="closeProductModal()">&times;</button>
    <h2 id="productModalTitle">상품 추가</h2>
    <div class="modal-form">
      <input type="hidden" id="prodEditId">
      <label>상품 ID (Apple/Google 등록 ID)</label>
      <input type="text" id="prodId" placeholder="saju_ticket_5">
      <label>상품명</label>
      <input type="text" id="prodName" placeholder="사주 티켓 5장">
      <label>티켓 수</label>
      <input type="number" id="prodTicketCount" placeholder="5">
      <label>가격 (원)</label>
      <input type="number" id="prodPrice" placeholder="5900">
      <label>정렬 순서</label>
      <input type="number" id="prodSort" placeholder="0">
      <div class="form-actions">
        <button class="btn-cancel" onclick="closeProductModal()">취소</button>
        <button class="btn-save" onclick="saveProduct()">저장</button>
      </div>
    </div>
  </div>
</div>

<!-- User Detail Modal -->
<div class="detail-overlay" id="userDetailOverlay" onclick="if(event.target===this)closeUserDetail()">
  <div class="detail-box" id="userDetailBox" style="width:700px"></div>
</div>

<script>
const API = '';
let token = localStorage.getItem('admin_token');
let currentTab = 'dashboard';
let userPage = 1;
let userSearchQuery = '';

if (token) { showApp(); loadDashboard(); }

async function login() {
  const username = document.getElementById('username').value;
  const password = document.getElementById('password').value;
  const errEl = document.getElementById('loginError');
  errEl.style.display = 'none';

  try {
    const res = await fetch(`${API}/api/admin/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    const data = await res.json();
    if (!res.ok) { errEl.textContent = data.error || '로그인 실패'; errEl.style.display = 'block'; return; }
    token = data.token;
    localStorage.setItem('admin_token', token);
    showApp();
    loadDashboard();
  } catch (e) {
    errEl.textContent = '서버 연결 실패'; errEl.style.display = 'block';
  }
}

function logout() {
  token = null;
  localStorage.removeItem('admin_token');
  document.getElementById('appView').style.display = 'none';
  document.getElementById('loginView').style.display = 'flex';
}

function showApp() {
  document.getElementById('loginView').style.display = 'none';
  document.getElementById('appView').style.display = 'block';
}

// ── Tab Switching ──

function switchTab(tab, btn) {
  currentTab = tab;
  document.querySelectorAll('.tabs button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');

  if (tab === 'dashboard') loadDashboard();
  if (tab === 'users') loadUsers();
  if (tab === 'inquiries') loadInquiries();
  if (tab === 'products') loadProducts();
}

// ── Dashboard ──

const SERVICE_NAMES = {
  fortune: '사주운세',
  daily: '오늘의운세',
  compatibility: '궁합',
  name_analysis: '이름풀이',
  signup: '가입보너스',
};

async function loadDashboard() {
  try {
    const res = await fetch(`${API}/api/admin/stats`, { headers: { Authorization: `Bearer ${token}` } });
    if (res.status === 401) { logout(); return; }
    const data = await res.json();

    document.getElementById('statTotalUsers').textContent = data.totalUsers.toLocaleString();
    document.getElementById('statTodayUsers').textContent = data.todayUsers.toLocaleString();
    document.getElementById('statPurchaseCount').textContent = data.purchaseCount.toLocaleString();
    document.getElementById('statPurchaseTickets').textContent = `총 ${data.purchaseTickets.toLocaleString()}장`;
    document.getElementById('statTodayConsumption').textContent = data.todayConsumption.toLocaleString() + '건';
    document.getElementById('statActiveUsers').textContent = data.activeUsers7d.toLocaleString();

    const tbody = document.getElementById('serviceBody');
    if (!data.serviceUsage || data.serviceUsage.length === 0) {
      tbody.innerHTML = '<tr><td colspan="3" style="text-align:center;padding:30px;color:#999">소모 내역이 없습니다.</td></tr>';
    } else {
      tbody.innerHTML = data.serviceUsage.map(s => `
        <tr>
          <td>${esc(SERVICE_NAMES[s.ref_id] || s.ref_id || '기타')}</td>
          <td>${parseInt(s.count).toLocaleString()}건</td>
          <td>${parseInt(s.total_tickets).toLocaleString()}장</td>
        </tr>
      `).join('');
    }
  } catch (e) {
    console.error(e);
  }
}

// ── Users ──

function searchUsers() {
  userSearchQuery = document.getElementById('userSearch').value.trim();
  userPage = 1;
  loadUsers();
}

async function loadUsers() {
  try {
    const params = new URLSearchParams({ page: userPage, limit: 20 });
    if (userSearchQuery) params.set('search', userSearchQuery);

    const res = await fetch(`${API}/api/admin/users?${params}`, { headers: { Authorization: `Bearer ${token}` } });
    if (res.status === 401) { logout(); return; }
    const data = await res.json();
    renderUsers(data.users || [], data.pagination);
  } catch (e) {
    document.getElementById('userBody').innerHTML = '<tr><td colspan="6" class="empty">유저 목록을 불러올 수 없습니다.</td></tr>';
  }
}

function renderUsers(users, pg) {
  const tbody = document.getElementById('userBody');
  if (users.length === 0) {
    tbody.innerHTML = '<tr><td colspan="6" class="empty">유저가 없습니다.</td></tr>';
    document.getElementById('userPagination').innerHTML = '';
    return;
  }

  tbody.innerHTML = users.map(u => `
    <tr onclick="openUserDetail('${esc(u.uid)}')">
      <td style="font-size:11px;font-family:monospace;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${esc(u.uid)}">${esc(u.uid.substring(0, 12))}...</td>
      <td>${esc(u.email || '-')}</td>
      <td>${esc(u.birth_date || '-')}</td>
      <td>${u.gender === 'male' ? '남' : u.gender === 'female' ? '여' : (esc(u.gender) || '-')}</td>
      <td>${u.balance}장</td>
      <td>${fmtDate(u.created_at)}</td>
    </tr>
  `).join('');

  const pagEl = document.getElementById('userPagination');
  pagEl.innerHTML = `
    <button onclick="goUserPage(${pg.page - 1})" ${pg.page <= 1 ? 'disabled' : ''}>이전</button>
    <span>${pg.page} / ${pg.totalPages} (총 ${pg.total}명)</span>
    <button onclick="goUserPage(${pg.page + 1})" ${pg.page >= pg.totalPages ? 'disabled' : ''}>다음</button>
  `;
}

function goUserPage(page) {
  userPage = page;
  loadUsers();
}

async function openUserDetail(uid) {
  try {
    const res = await fetch(`${API}/api/admin/users/${uid}`, { headers: { Authorization: `Bearer ${token}` } });
    if (!res.ok) { alert('유저 정보를 불러올 수 없습니다.'); return; }
    const data = await res.json();
    const u = data.user;

    const genderText = u.gender === 'male' ? '남' : u.gender === 'female' ? '여' : (u.gender || '-');

    let txnHtml = '';
    if (data.transactions && data.transactions.length > 0) {
      txnHtml = `
        <table class="txn-table">
          <thead><tr><th>일시</th><th>유형</th><th>수량</th><th>잔액</th><th>참조</th></tr></thead>
          <tbody>
            ${data.transactions.map(t => `
              <tr>
                <td>${fmtDate(t.created_at)}</td>
                <td>${esc(t.type)}</td>
                <td style="color:${t.amount > 0 ? '#16a34a' : '#dc2626'};font-weight:600">${t.amount > 0 ? '+' : ''}${t.amount}</td>
                <td>${t.balance_after}</td>
                <td style="font-size:11px;color:#888">${esc(t.ref_id || '-')}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;
    } else {
      txnHtml = '<div class="empty" style="padding:20px">거래 내역이 없습니다.</div>';
    }

    document.getElementById('userDetailBox').innerHTML = `
      <button class="close-btn" onclick="closeUserDetail()">&times;</button>
      <h2>유저 상세</h2>

      <div class="user-detail-grid" style="margin-top:16px">
        <div class="field"><div class="label">UID</div><div class="val" style="font-size:11px;word-break:break-all">${esc(u.uid)}</div></div>
        <div class="field"><div class="label">이메일</div><div class="val">${esc(u.email || '-')}</div></div>
        <div class="field"><div class="label">생년월일</div><div class="val">${esc(u.birth_date || '-')}</div></div>
        <div class="field"><div class="label">성별</div><div class="val">${genderText}</div></div>
        <div class="field"><div class="label">가입일</div><div class="val">${fmtDate(u.created_at)}</div></div>
        <div class="field"><div class="label">수정일</div><div class="val">${fmtDate(u.updated_at)}</div></div>
      </div>

      <div class="mini-cards">
        <div class="mini-card"><div class="num">${data.balance}</div><div class="lbl">보유 티켓</div></div>
        <div class="mini-card"><div class="num">${data.resultsCount}</div><div class="lbl">저장된 결과</div></div>
        <div class="mini-card"><div class="num">${data.compatibilityCount}</div><div class="lbl">궁합 히스토리</div></div>
      </div>

      <div class="section-title">티켓 지급</div>
      <div class="grant-form">
        <input type="number" id="grantAmount" placeholder="수량" min="1">
        <button onclick="grantTickets('${esc(u.uid)}')">지급</button>
      </div>

      <div class="section-title">거래 내역 (최근 50건)</div>
      ${txnHtml}
    `;

    document.getElementById('userDetailOverlay').classList.add('show');
  } catch (e) {
    console.error(e);
    alert('유저 정보를 불러올 수 없습니다.');
  }
}

function closeUserDetail() {
  document.getElementById('userDetailOverlay').classList.remove('show');
}

async function grantTickets(uid) {
  const amountInput = document.getElementById('grantAmount');
  const amount = parseInt(amountInput.value);
  if (!amount || amount <= 0) { alert('지급할 수량을 입력하세요.'); return; }
  if (!confirm(`${amount}장의 티켓을 지급하시겠습니까?`)) return;

  try {
    const res = await fetch(`${API}/api/admin/users/${uid}/grant-tickets`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
      body: JSON.stringify({ amount })
    });
    const data = await res.json();
    if (!res.ok) { alert(data.error || '지급 실패'); return; }
    alert(`지급 완료! 현재 잔액: ${data.balance}장`);
    openUserDetail(uid);
  } catch (e) {
    alert('서버 오류');
  }
}

// ── Inquiries ──

let currentFilter = 'all';

function filterStatus(status, btn) {
  currentFilter = status;
  document.querySelectorAll('.filters button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  loadInquiries();
}

async function loadInquiries() {
  try {
    const url = currentFilter === 'all' ? `${API}/api/admin/inquiries` : `${API}/api/admin/inquiries?status=${currentFilter}`;
    const res = await fetch(url, { headers: { Authorization: `Bearer ${token}` } });
    if (res.status === 401) { logout(); return; }
    const data = await res.json();
    renderList(data.inquiries || []);
  } catch (e) {
    document.getElementById('inquiryList').innerHTML = '<div class="empty">목록을 불러올 수 없습니다.</div>';
  }
}

function renderList(items) {
  const el = document.getElementById('inquiryList');
  if (items.length === 0) { el.innerHTML = '<div class="empty">문의가 없습니다.</div>'; return; }

  el.innerHTML = items.map(i => `
    <div class="inquiry-item" onclick="openDetail(${i.id})">
      <span class="badge ${i.status}">${i.status === 'replied' ? '답변완료' : '대기중'}</span>
      <div class="inquiry-info">
        <div class="inquiry-title">${esc(i.title)}</div>
        <div class="inquiry-meta">${esc(i.email || i.uid)} &middot; ${fmtDate(i.created_at)}</div>
      </div>
      <span class="inquiry-category">${esc(i.category)}</span>
    </div>
  `).join('');
}

async function openDetail(id) {
  try {
    const res = await fetch(`${API}/api/admin/inquiries/${id}`, { headers: { Authorization: `Bearer ${token}` } });
    const data = await res.json();
    const i = data.inquiry;

    let replyHtml;
    if (i.status === 'replied') {
      replyHtml = `
        <div class="detail-section">
          <label>답변 (${fmtDate(i.replied_at)})</label>
          <div class="reply-existing">${esc(i.reply)}</div>
        </div>
        <div class="reply-box">
          <label style="font-size:12px;color:#888;margin-bottom:4px;display:block">답변 수정</label>
          <textarea id="replyText">${esc(i.reply)}</textarea>
          <button onclick="submitReply(${i.id})">답변 수정</button>
        </div>
      `;
    } else {
      replyHtml = `
        <div class="reply-box">
          <label style="font-size:12px;color:#888;margin-bottom:4px;display:block">답변 작성</label>
          <textarea id="replyText" placeholder="답변을 입력하세요..."></textarea>
          <button onclick="submitReply(${i.id})">답변 등록</button>
        </div>
      `;
    }

    document.getElementById('detailBox').innerHTML = `
      <button class="close-btn" onclick="closeDetail()">&times;</button>
      <span class="badge ${i.status}" style="margin-bottom:8px;display:inline-block">${i.status === 'replied' ? '답변완료' : '대기중'}</span>
      <span class="inquiry-category" style="margin-left:8px">${esc(i.category)}</span>
      <h2 style="margin-top:12px">${esc(i.title)}</h2>
      <div class="inquiry-meta">${esc(i.email || i.uid)} &middot; ${fmtDate(i.created_at)}</div>
      <div class="detail-section">
        <label>문의 내용</label>
        <div class="value">${esc(i.content)}</div>
      </div>
      ${replyHtml}
    `;
    document.getElementById('detailOverlay').classList.add('show');
  } catch (e) {
    alert('문의를 불러올 수 없습니다.');
  }
}

function closeDetail() {
  document.getElementById('detailOverlay').classList.remove('show');
}

async function submitReply(id) {
  const reply = document.getElementById('replyText').value.trim();
  if (!reply) { alert('답변을 입력하세요.'); return; }

  try {
    const res = await fetch(`${API}/api/admin/inquiries/${id}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
      body: JSON.stringify({ reply })
    });
    if (!res.ok) { alert('답변 등록 실패'); return; }
    closeDetail();
    loadInquiries();
  } catch (e) {
    alert('서버 오류');
  }
}

// ── Products ──

async function loadProducts() {
  try {
    const res = await fetch(`${API}/api/admin/products`, { headers: { Authorization: `Bearer ${token}` } });
    if (res.status === 401) { logout(); return; }
    const data = await res.json();
    renderProducts(data.products || []);
  } catch (e) {
    document.getElementById('productBody').innerHTML = '<tr><td colspan="7" style="text-align:center;padding:40px;color:#999">상품을 불러올 수 없습니다.</td></tr>';
  }
}

function renderProducts(items) {
  const el = document.getElementById('productBody');
  if (items.length === 0) {
    el.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:40px;color:#999">등록된 상품이 없습니다.</td></tr>';
    return;
  }

  el.innerHTML = items.map(p => `
    <tr>
      <td><code style="background:#f3f4f6;padding:2px 6px;border-radius:4px;font-size:12px">${esc(p.product_id)}</code></td>
      <td>${esc(p.name)}</td>
      <td>${p.ticket_count}장</td>
      <td>${Number(p.price_krw).toLocaleString()}원</td>
      <td>
        <label class="toggle">
          <input type="checkbox" ${p.is_active ? 'checked' : ''} onchange="toggleProduct(${p.id}, this.checked)">
          <span class="slider"></span>
        </label>
      </td>
      <td>${p.sort_order}</td>
      <td>
        <button class="btn-edit" onclick='editProduct(${JSON.stringify(p)})'>수정</button>
        <button class="btn-del" onclick="deleteProduct(${p.id}, '${esc(p.name)}')">삭제</button>
      </td>
    </tr>
  `).join('');
}

function openProductModal(product) {
  document.getElementById('prodEditId').value = product ? product.id : '';
  document.getElementById('prodId').value = product ? product.product_id : '';
  document.getElementById('prodId').disabled = !!product;
  document.getElementById('prodName').value = product ? product.name : '';
  document.getElementById('prodTicketCount').value = product ? product.ticket_count : '';
  document.getElementById('prodPrice').value = product ? product.price_krw : '';
  document.getElementById('prodSort').value = product ? product.sort_order : '0';
  document.getElementById('productModalTitle').textContent = product ? '상품 수정' : '상품 추가';
  document.getElementById('productOverlay').classList.add('show');
}

function closeProductModal() {
  document.getElementById('productOverlay').classList.remove('show');
  document.getElementById('prodId').disabled = false;
}

function editProduct(product) {
  openProductModal(product);
}

async function saveProduct() {
  const editId = document.getElementById('prodEditId').value;
  const body = {
    product_id: document.getElementById('prodId').value.trim(),
    name: document.getElementById('prodName').value.trim(),
    ticket_count: parseInt(document.getElementById('prodTicketCount').value) || 0,
    price_krw: parseInt(document.getElementById('prodPrice').value) || 0,
    sort_order: parseInt(document.getElementById('prodSort').value) || 0,
  };

  if (!body.product_id || !body.name || !body.ticket_count) {
    alert('상품 ID, 상품명, 티켓 수는 필수입니다.');
    return;
  }

  try {
    const url = editId ? `${API}/api/admin/products/${editId}` : `${API}/api/admin/products`;
    const method = editId ? 'PUT' : 'POST';
    const res = await fetch(url, {
      method,
      headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
      body: JSON.stringify(body)
    });

    if (!res.ok) {
      const data = await res.json();
      alert(data.error || '저장 실패');
      return;
    }

    closeProductModal();
    loadProducts();
  } catch (e) {
    alert('서버 오류');
  }
}

async function toggleProduct(id, isActive) {
  try {
    await fetch(`${API}/api/admin/products/${id}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
      body: JSON.stringify({ is_active: isActive })
    });
  } catch (e) {
    alert('상태 변경 실패');
    loadProducts();
  }
}

async function deleteProduct(id, name) {
  if (!confirm(`"${name}" 상품을 삭제하시겠습니까?`)) return;

  try {
    const res = await fetch(`${API}/api/admin/products/${id}`, {
      method: 'DELETE',
      headers: { Authorization: `Bearer ${token}` }
    });
    if (!res.ok) { alert('삭제 실패'); return; }
    loadProducts();
  } catch (e) {
    alert('서버 오류');
  }
}

// ── Utilities ──

function esc(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function fmtDate(s) {
  if (!s) return '';
  const d = new Date(s);
  return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

document.getElementById('password').addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
</script>
